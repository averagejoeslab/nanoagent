name: Nanoagent Self Review

on:
  push:
    branches: [main, master]
    paths:
      - 'nanoagent.ts'
      - 'Dockerfile.sandbox'
      - 'package.json'
      - 'bun.lockb'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'nanoagent.ts'
      - 'Dockerfile.sandbox'
      - 'package.json'
      - 'bun.lockb'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Self-review workflow
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          DISABLE_SANDBOX: "true"
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
        run: |
          .github/scripts/run-agent.sh "Complete self-review and issue reconciliation workflow:
          
          STEP 1: Review all TypeScript files in this repository
          - Check for code quality issues
          - Check for potential bugs
          - Check for performance problems
          - Check for missing error handling
          - Check for inconsistencies with README
          - Check for security concerns
          - Document each finding with priority level (Critical/High/Medium/Low)
          
          STEP 2: Get all open GitHub issues
          - Use bash tool: gh issue list --state open --json number,title,body,labels --limit 200
          - Parse the JSON to understand existing issues
          
          STEP 3: Compare findings to existing issues and reconcile
          
          For each FINDING from your review:
          a) Check if exact match exists in open issues
             - If exact match: skip (already tracked)
          
          b) Check if similar issue exists
             - If similar with NEW information: use bash to comment on existing issue
               gh issue comment <number> --body '<new information>'
             - If similar with NO new info: skip
          
          c) If no match exists: create new GitHub issue
             gh issue create --title '[Nanoagent Review] <clear title>' --body '<detailed description>' --label <bug|enhancement|documentation>
          
          d) Identify any duplicate issues in your findings
             - For duplicates: consolidate into primary issue
             - Add comment to primary preserving all info
             - Close duplicate: gh issue close <number> --reason 'not planned' --comment 'Duplicate of #<primary>'
          
          For each OPEN ISSUE not found in your findings:
          a) MANDATORY: Read the specific code section mentioned in the issue
             - Use the read tool to check the exact file/line mentioned
             - Use grep to search for the pattern/code the issue describes
             - Do NOT skip this step - you must verify EVERY open issue
          b) If issue is FIXED/RESOLVED (code no longer has the problem):
             - Close it: gh issue close <number> --reason 'completed' --comment 'Verified fixed in current codebase. Checked [file:line] and confirmed: <specific explanation of what was fixed>'
          c) If issue STILL EXISTS (confirmed by reading code):
             - Keep it open, do not close
             - Add comment documenting verification: gh issue comment <number> --body 'Verified still exists in current code at [location]. Confirmed: <specific evidence>'
          
          IMPORTANT: You MUST verify at least 10 open issues by actually reading code.
          Do NOT make assumptions. Read the actual code files to confirm each issue's status.
          Log each verification: "Verified #X by reading [file] - Status: [OPEN/CLOSED]"
          
          STEP 4: Write ISSUES.md
          After all reconciliation, create ISSUES.md with:
          - All currently OPEN GitHub issues (after your changes)
          - Group by priority: Critical, High, Medium, Low
          - Each entry: '- #<number> - <title>'
          - Link to actual GitHub issue numbers
          - Clean, readable format
          - NO closed issues
          
          Example format:
          # Open Issues
          
          ## Critical (3)
          - #55 - Command injection vulnerabilities
          - #74 - Uncaught promise rejections
          - #80 - API key validation missing
          
          ## High (2)
          - #46 - Race condition in sandbox
          - #65 - No max iteration limit
          
          ...and so on for Medium and Low priorities.
          
          STEP 5: PR comment (only if this is a pull request)
          - Check if environment variable IS_PR equals 'true'
          - If yes:
            * Read ISSUES.md
            * Create concise summary of changes made (created/updated/closed counts)
            * Post: gh pr comment \$PR_NUMBER --body '<summary>'
          - If no: skip this step
          
          STEP 6: Report final statistics
          Print clear stats:
          - 'Review complete.'
          - 'Code sections verified: X issues'
          - 'Created: Y new issues'
          - 'Updated: Z existing issues'
          - 'Closed: W resolved issues'
          - 'Total open: N issues'
          
          Execute all steps in order. Use your tools (read, write, bash) to complete the workflow.
          
          CRITICAL REQUIREMENTS:
          - You MUST use the read tool to verify at least 10 open issues by checking actual code
          - You MUST close issues that are verifiably fixed (with specific evidence from code)
          - You MUST not assume issues are valid without reading the code
          - ISSUES.md must accurately reflect all open GitHub issues after reconciliation
          - Log each code verification you perform for transparency"

      - name: Commit ISSUES.md
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ISSUES.md
          git diff --staged --quiet || git commit -m "chore: update ISSUES.md from self-review"
          git push
        if: github.event_name != 'pull_request'
      
      - name: Upload ISSUES.md artifact
        uses: actions/upload-artifact@v4
        with:
          name: issues-report
          path: ISSUES.md
          retention-days: 30
        if: always()
