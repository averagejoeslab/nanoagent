name: Nanoagent Self Review

on:
  push:
    branches: [main, master]
    paths:
      - 'nanoagent.ts'
      - 'Dockerfile.sandbox'
      - 'package.json'
      - 'bun.lockb'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'nanoagent.ts'
      - 'Dockerfile.sandbox'
      - 'package.json'
      - 'bun.lockb'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Self-review workflow
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          DISABLE_SANDBOX: "true"
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
        run: |
          bun nanoagent.ts "Complete self-review workflow in one continuous session:
          
          STEP 1: Review all TypeScript files in this repository
          - Check for code quality issues
          - Check for potential bugs
          - Check for performance problems
          - Check for missing error handling
          - Check for inconsistencies with README
          - Check for security concerns
          
          STEP 2: Create review report
          - Write your detailed findings to review-report.md
          - If no issues found, write 'No issues found.' to the file and skip to final stats
          
          STEP 3: Get existing GitHub issues (if issues were found)
          - Use bash tool: gh issue list --state open --json number,title,body --limit 100
          - Parse the JSON output to understand existing issues
          
          STEP 4: Process findings into GitHub issues (if issues were found)
          For each distinct issue in your review:
          - Compare with existing issues (check title and content similarity)
          - If similar issue exists:
            * Determine if your finding contains new information not in the existing issue
            * If yes: use bash tool to comment: gh issue comment <number> --body '<new info>'
            * If no new info: skip this finding
          - If no similar issue exists:
            * Use bash tool to create: gh issue create --title '[Nanoagent Review] <clear title>' --body '<detailed description>' --label <bug|enhancement|documentation>
          
          STEP 5: PR comment (only if this is a pull request)
          - Check if environment variable IS_PR equals 'true'
          - If yes:
            * Read review-report.md
            * Create a concise summary of the key findings
            * Use bash tool to post: gh pr comment \$PR_NUMBER --body '<summary>'
          - If no: skip this step
          
          STEP 6: Report final statistics
          - Print clear stats: 'Review complete. Created X issues, updated Y issues, skipped Z issues.'
          
          Execute all steps in order using your available tools (read, write, bash). Reason through each step and take appropriate actions."

      - name: Upload review report
        uses: actions/upload-artifact@v4
        with:
          name: code-review-report
          path: review-report.md
          retention-days: 30
        if: always()
